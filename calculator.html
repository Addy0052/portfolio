<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS Style Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .calculator {
            width: 330px;
            background: #000;
            padding: 20px;
            border-radius: 35px;
        }

        .screen input {
            width: 100%;
            height: 90px;
            border: none;
            background: transparent;
            color: white;
            text-align: right;
            font-size: 3rem;
            padding: 10px;
        }

        .buttons {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 70px;
            border: none;
            border-radius: 50px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn {
            background: #333;
            color: #fff;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .operator {
            background: #f1a33c;
            color: white;
        }

        .operator:active {
            transform: scale(0.95);
        }

        .light {
            background: #a5a5a5;
            color: #000;
        }

        .zero {
            grid-column: span 2;
            text-align: left;
            padding-left: 28px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="screen">
            <input type="text" id="display" disabled />
        </div>

        <div class="buttons">
            <button class="light" id="clear">C</button>
            <button class="light" id="delete">⌫</button>
            <button class="light" data-val="%">%</button>
            <button class="operator" data-val="/">÷</button>

            <button class="btn" data-val="7">7</button>
            <button class="btn" data-val="8">8</button>
            <button class="btn" data-val="9">9</button>
            <button class="operator" data-val="*">×</button>

            <button class="btn" data-val="4">4</button>
            <button class="btn" data-val="5">5</button>
            <button class="btn" data-val="6">6</button>
            <button class="operator" data-val="-">−</button>

            <button class="btn" data-val="1">1</button>
            <button class="btn" data-val="2">2</button>
            <button class="btn" data-val="3">3</button>
            <button class="operator" data-val="+">+</button>

            <button class="btn zero" data-val="0">0</button>
            <button class="btn" data-val=".">.</button>
            <button class="operator" id="equals">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");
        const buttons = document.querySelectorAll("button[data-val]");
        const clearBtn = document.getElementById("clear");
        const deleteBtn = document.getElementById("delete");
        const equalsBtn = document.getElementById("equals");

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                display.value += btn.getAttribute("data-val");
            });
        });

        clearBtn.addEventListener("click", () => {
            display.value = "";
        });

        deleteBtn.addEventListener("click", () => {
            display.value = display.value.slice(0, -1);
        });

        equalsBtn.addEventListener("click", () => {
            try {
                display.value = eval(display.value.replace("%", "/100"));
            } catch {
                display.value = "Error";
            }
        });
    </script>
</body>
</html>
