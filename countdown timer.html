<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Countdown Timer</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
        color: #fff;
        padding: 20px;
    }

    .timer-container {
        text-align: center;
        background: rgba(255,255,255,0.08);
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 30px rgba(255,255,255,0.1);
        width: 100%;
        max-width: 550px;
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
        margin-bottom: 25px;
        font-size: 28px;
    }

    .timer {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .box {
        flex: 1;
        background: rgba(255,255,255,0.12);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 20px rgba(0,255,255,0.2);
        position: relative;
    }

    .num {
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 1px;
        animation: glow 1.4s infinite alternate ease-in-out;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #00eaff; }
        to   { text-shadow: 0 0 20px #00eaff; }
    }

    .label {
        margin-top: 5px;
        font-size: 16px;
        opacity: 0.8;
    }

    /* Flip Animation */
    .flip {
        animation: flip 0.6s ease-in-out;
    }

    @keyframes flip {
        0%   { transform: rotateX(0deg); }
        50%  { transform: rotateX(-90deg); }
        100% { transform: rotateX(0deg); }
    }

    @media(max-width: 600px) {
        .num { font-size: 34px; }
        h1 { font-size: 22px; }
    }
</style>
</head>

<body>

<div class="timer-container">
    <h1>Countdown Timer</h1>

    <div class="timer">
        <div class="box">
            <div id="days" class="num">00</div>
            <div class="label">Days</div>
        </div>

        <div class="box">
            <div id="hours" class="num">00</div>
            <div class="label">Hours</div>
        </div>

        <div class="box">
            <div id="minutes" class="num">00</div>
            <div class="label">Minutes</div>
        </div>

        <div class="box">
            <div id="seconds" class="num">00</div>
            <div class="label">Seconds</div>
        </div>
    </div>
</div>


<script>
    // SET TARGET DATE HERE ▼
    const targetDate = new Date("Dec 31, 2026 23:59:59").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff <= 0) {
            document.querySelector(".timer-container").innerHTML = "<h1>🎉 Countdown Finished! 🎉</h1>";
            return;
        }

        // Time calculations
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        animateChange("days", d);
        animateChange("hours", h);
        animateChange("minutes", m);
        animateChange("seconds", s);
    }

    function animateChange(id, newValue) {
        const element = document.getElementById(id);

        if (element.textContent != newValue) {
            element.classList.add("flip");
            setTimeout(() => element.classList.remove("flip"), 600);
        }

        element.textContent = String(newValue).padStart(2, "0");
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
