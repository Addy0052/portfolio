<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>iOS Style To‑Do List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    body {
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    #todo-container {
      width: 380px;
      background: #fff;
      padding: 20px 25px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    h2 {
      margin-bottom: 15px;
      color: #111;
      font-weight: 600;
    }

    #input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    #new-task {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: .2s;
    }

    #new-task:focus {
      border-color: #007aff;
      box-shadow: 0 0 5px rgba(0,122,255,0.5);
    }

    #add-btn {
      padding: 12px 18px;
      background: #007aff;
      border: none;
      color: #fff;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: .2s;
    }

    #add-btn:hover {
      opacity: .85;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f9f9f9;
      padding: 12px 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: .2s;
    }

    li.completed span {
      text-decoration: line-through;
      color: gray;
    }

    li:hover {
      background: #ececec;
    }

    .delete-btn {
      background: #ff3b30;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      transition: .2s;
    }

    .delete-btn:hover {
      opacity: .85;
    }
  </style>
</head>
<body>
  <div id="todo-container">
    <h2>To‑Do List</h2>

    <div id="input-area">
      <input type="text" id="new-task" placeholder="Enter a new task">
      <button id="add-btn">Add</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script>
    const taskInput = document.getElementById('new-task');
    const taskList = document.getElementById('task-list');
    const addBtn = document.getElementById('add-btn');

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const taskText = taskInput.value.trim();
      if (taskText === '') return alert('Please enter a task.');

      const li = document.createElement('li');
      const span = document.createElement('span');
      span.textContent = taskText;

      span.onclick = () => li.classList.toggle('completed');

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.className = 'delete-btn';
      deleteBtn.onclick = () => li.remove();

      li.append(span, deleteBtn);
      taskList.appendChild(li);

      taskInput.value = '';
    }
  </script>
</body>
</html>
