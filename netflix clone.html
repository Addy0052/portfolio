<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* GLOBAL */
body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #000;
    color: #fff;
    margin: 0;
    padding: 0;
}

.hidden-section {
    display: none !important;
}

/* NAVBAR */
header {
    z-index: 1000;
    border-bottom: 2px solid #e50914;
}

.nav-link:hover {
    color: #e50914 !important;
}

/* HERO */
.hero {
    position: relative;
    height: 100vh;
    background: url('images/stranger things.jpg') no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero-content {
    z-index: 2;
    max-width: 600px;
    animation: fadeIn 2s ease-in-out;
}

.hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* SLIDER */
.slider {
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
}

.slider-track {
    display: flex;
    gap: 12px;
    transition: transform 0.5s ease;
}

.movie-card {
    width: 200px;
    height: 300px;
    border-radius: 5px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: 0.3s;
    cursor: pointer;
}

.movie-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.movie-card:hover {
    transform: scale(1.05);
    border-color: #e50914;
    box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
}

.arrow {
    position: absolute;
    font-size: 27px;
    padding: 14px;
    background: rgba(0, 0, 0, 0.6);
    border: none;
    color: white;
    cursor: pointer;
    z-index: 10;
}

.arrow:hover {
    background: rgba(229, 9, 20, 0.8);
}

.left-arrow { left: 0; }
.right-arrow { right: 0; }

/* LOGIN SECTION */
#login-section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 360px;
    background: rgba(10, 10, 10, 0.9);
    padding: 40px;
    border-radius: 8px;
    border: 1px solid #e50914;
    box-shadow: 0 0 30px rgba(229,9,20,0.3);
}

.login-box input {
    background: #333 !important;
    color: white !important;
    border: none !important;
}

.btn-login {
    background: #e50914;
    width: 100%;
    color: #fff;
}

.btn-login:hover {
    background: #b00710;
}

/* ACCOUNT SECTION */
#account-section {
    padding: 120px 20px;
}

.section-box {
    background: #111;
    padding: 30px;
    border-radius: 8px;
    border: 1px solid #e50914;
    max-width: 600px;
    margin: auto;
}

.section-box h3 {
    color: #e50914;
    margin-bottom: 20px;
}

footer {
    background: #0d0d0d;
    color: #999;
    padding: 40px 10px;
    border-top: 2px solid #e50914;
}

footer a {
    color: #999;
    text-decoration: none;
}

footer a:hover {
    color: #e50914;
    text-decoration: underline;
}

hr { border-color: #e50914; }

@media (max-width: 768px) {
    .hero-content h1 { font-size: 2rem; }
    .movie-card { width: 150px; height: 225px; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="fixed-top bg-black">
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand" href="#" onclick="showPage('home-section')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png" height="30">
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" onclick="showPage('home-section')">Home</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showPage('login-section')">Login</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showPage('account-section')">Account</a></li>
            </ul>
        </div>
    </nav>
</header>

<!-- PAGE 1 — HOME -->
<section id="home-section">
    <div class="hero">
        <div class="hero-content">
            <h1 class="display-4 fw-bold">Stranger Things</h1>
            <p class="lead">A town uncovers a supernatural mystery after a young boy disappears.</p>
            <button class="btn btn-light"><i class="fa fa-play"></i> Play</button>
        </div>
        <div class="hero-overlay"></div>
    </div>

    <div class="content">
        <div class="row-container" id="trend">
            <h2 class="text-danger ps-4">Trending Now</h2>

            <div class="slider">
                <button class="arrow left-arrow"><i class="fa fa-chevron-left"></i></button>
                <div class="slider-track">
                    <div class="movie-card"><img src="images/1.jfif"></div>
                    <div class="movie-card"><img src="images/2.jfif"></div>
                    <div class="movie-card"><img src="images/3.jfif"></div>
                    <div class="movie-card"><img src="images/4.jfif"></div>
                    <div class="movie-card"><img src="images/5.jfif"></div>
                    <div class="movie-card"><img src="images/6.jfif"></div>
                    <div class="movie-card"><img src="images/7.jfif"></div>
                    <div class="movie-card"><img src="images/8.jfif"></div>
                    <div class="movie-card"><img src="images/9.jfif"></div>
                    <div class="movie-card"><img src="images/10.jfif"></div>
                </div>
                <button class="arrow right-arrow"><i class="fa fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</section>

<!-- PAGE 2 — LOGIN -->
<section id="login-section" class="hidden-section">
    <div class="login-box">
        <h3 class="text-center mb-4">Login</h3>
        <input type="email" class="form-control mb-3" placeholder="Email">
        <input type="password" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-login">Login</button>
    </div>
</section>

<!-- PAGE 3 — ACCOUNT -->
<section id="account-section" class="hidden-section">
    <div class="section-box text-center">
        <h3>Account Details</h3>
        <p><strong>Name:</strong> John Doe</p>
        <p><strong>Email:</strong> johndoe@example.com</p>
        <p><strong>Membership:</strong> Premium</p>
        <button class="btn btn-danger mt-3" onclick="showPage('home-section')">Back to Home</button>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <div class="container text-center">
        <p>© 2024 Netflix Clone. All rights reserved.</p>
    </div>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showPage(id) {
    document.querySelectorAll('section').forEach(sec => sec.classList.add('hidden-section'));
    document.getElementById(id).classList.remove('hidden-section');
}

/* Slider functionality */
document.querySelectorAll('.slider').forEach(slider => {
    const track = slider.querySelector('.slider-track');
    const leftArrow = slider.querySelector('.left-arrow');
    const rightArrow = slider.querySelector('.right-arrow');
    let scrollAmount = 0;
    const scrollStep = 210;

    rightArrow.addEventListener('click', () => {
        scrollAmount += scrollStep;
        const maxScroll = track.scrollWidth - slider.offsetWidth;
        if(scrollAmount > maxScroll) scrollAmount = maxScroll;
        track.style.transform = `translateX(-${scrollAmount}px)`;
    });

    leftArrow.addEventListener('click', () => {
        scrollAmount -= scrollStep;
        if(scrollAmount < 0) scrollAmount = 0;
        track.style.transform = `translateX(-${scrollAmount}px)`;
    });
});
</script>

</body>
</html>
